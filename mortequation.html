<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage Cash Flow Equations | CFA Institute</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #1f2937;
      line-height: 1.5;
      padding: 1.25rem;
    }

    :root {
      --color-gray-800: #1f2937;
    }

    #static-equations-card {
      min-height: 380px;
    }

    @media (max-width: 700px) {
      #static-equations-card {
        min-height: 580px;
      }
    }

    .static-equations-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .static-equation-row {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 1.2fr);
      align-items: center;
      column-gap: 1.75rem;
      row-gap: 0.75rem;
    }

    .static-equation-label {
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--color-gray-800);
    }

    .static-equation-label math {
      font-family: "STIX Two Math", "Cambria Math", "Latin Modern Math", serif;
      font-size: 1em;
    }

    .static-equation-math {
      text-align: left;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .static-equation-math math {
      display: inline-block;
      font-family: "STIX Two Math", "Cambria Math", "Latin Modern Math", serif;
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-gray-800);
      margin: 0.5rem auto;
      min-width: max-content;
    }

    @media (max-width: 700px) {
      .static-equation-row {
        grid-template-columns: 1fr;
      }

      .static-equation-math {
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      MathML: {
        extensions: ["content-mathml.js"]
      },
      "HTML-CSS": {
        scale: 100,
        linebreaks: { automatic: true }
      },
      showProcessingMessages: false,
      messageStyle: "none",
      skipStartupTypeset: false
    });

    function removeMathJaxTabindex() {
      document.querySelectorAll(".MathJax, .MathJax_Display, [id^='MathJax-']").forEach(function (el) {
        el.removeAttribute("tabindex");
      });
    }

    MathJax.Hub.Register.StartupHook("End", function () {
      removeMathJaxTabindex();
      setTimeout(removeMathJaxTabindex, 100);
      setTimeout(removeMathJaxTabindex, 500);
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=MML_HTMLorMML"></script>
</head>
<body>
  <section id="static-equations-card" aria-label="Static cash flow equations">
    <div class="static-equations-grid">

      <div class="static-equation-row">
        <p class="static-equation-label">Monthly Cash Flow Equation:</p>
        <div class="static-equation-math">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <mi mathcolor="#3c6ae5">PMT</mi>
              <mo>=</mo>
              <mfrac>
                <mrow>
                  <mfrac>
                    <mi mathcolor="#7a46ff">r</mi>
                    <mn>12</mn>
                  </mfrac>
                  <mo>&times;</mo>
                  <mi mathcolor="#b95b1d">PV</mi>
                </mrow>
                <mrow>
                  <mn>1</mn>
                  <mo>&minus;</mo>
                  <msup>
                    <mrow>
                      <mo>(</mo>
                      <mn>1</mn>
                      <mo>+</mo>
                      <mfrac>
                        <mi mathcolor="#7a46ff">r</mi>
                        <mn>12</mn>
                      </mfrac>
                      <mo>)</mo>
                    </mrow>
                    <mrow>
                      <mo>&minus;</mo>
                      <mi mathcolor="#0079a6">T</mi>
                    </mrow>
                  </msup>
                </mrow>
              </mfrac>
            </mrow>
          </math>
        </div>
      </div>

      <div class="static-equation-row">
        <p class="static-equation-label">
          Interest Cash Flow Equation for
          <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>t</mi></math>
          = 1, first payment:
        </p>
        <div class="static-equation-math">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <msub>
                <mi mathcolor="#0079a6">INT</mi>
                <mn>1</mn>
              </msub>
              <mo>=</mo>
              <mfrac>
                <mrow>
                  <mi mathcolor="#b95b1d">PV</mi>
                  <mo>&times;</mo>
                  <mi mathcolor="#7a46ff">r</mi>
                </mrow>
                <mn>12</mn>
              </mfrac>
            </mrow>
          </math>
        </div>
      </div>

      <div class="static-equation-row">
        <p class="static-equation-label">
          General Interest Cash Flow Equation where
          <math xmlns="http://www.w3.org/1998/Math/MathML">
            <mrow><mi>t</mi><mo>&ge;</mo><mn>2</mn></mrow>
          </math>
          :
        </p>
        <div class="static-equation-math">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <msub>
                <mi mathcolor="#0079a6">INT</mi>
                <mi>t</mi>
              </msub>
              <mo>=</mo>
              <mfrac>
                <mrow>
                  <mo>(</mo>
                  <mi mathcolor="#b95b1d">PV</mi>
                  <mo>&minus;</mo>
                  <munderover>
                    <mo>&sum;</mo>
                    <mrow>
                      <mi>i</mi>
                      <mo>=</mo>
                      <mn>1</mn>
                    </mrow>
                    <mrow>
                      <mi mathcolor="#0079a6">t</mi>
                      <mo>&minus;</mo>
                      <mn>1</mn>
                    </mrow>
                  </munderover>
                  <msub>
                    <mi mathcolor="#b82937">PRN</mi>
                    <mi>i</mi>
                  </msub>
                  <mo>)</mo>
                  <mo>&times;</mo>
                  <mi mathcolor="#7a46ff">r</mi>
                </mrow>
                <mn>12</mn>
              </mfrac>
            </mrow>
          </math>
        </div>
      </div>

      <div class="static-equation-row">
        <p class="static-equation-label">Principal Amortization Equation:</p>
        <div class="static-equation-math">
          <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
            <mrow>
              <msub>
                <mi mathcolor="#b82937">PRN</mi>
                <mi>t</mi>
              </msub>
              <mo>=</mo>
              <mi mathcolor="#3c6ae5">PMT</mi>
              <mo>&minus;</mo>
              <msub>
                <mi mathcolor="#0079a6">INT</mi>
                <mi>t</mi>
              </msub>
            </mrow>
          </math>
        </div>
      </div>

    </div>
  </section>
</body>
</html>
